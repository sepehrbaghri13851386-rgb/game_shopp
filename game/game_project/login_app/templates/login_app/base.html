<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}سامانه{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f172a;
      --card:#1e293b;
      --ink:#f1f5f9;
      --muted:#94a3b8;
      --line:#334155;
      --primary:#0ea5e9;
      --accent:#8b5cf6;
      --ring:#93c5fd;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{font-family:"Plus Jakarta Sans", system-ui, sans-serif; background:var(--bg); color:var(--ink); min-height:100svh}

    /* ---------- Header ---------- */
    .topbar{display:flex; align-items:center; justify-content:space-between; padding:14px 26px; background:var(--card); border-bottom:1px solid var(--line)}
    .topbar .brand{display:flex; align-items:center; gap:12px}
    .topbar .logo{width:38px; height:38px; border-radius:10px; display:grid; place-items:center; font-weight:800; color:#fff; background:linear-gradient(135deg,var(--primary),var(--accent))}
    .topbar .title{font-weight:700; font-size:1.05rem}

    .topbar .user{display:flex; align-items:center; gap:14px}
    .topbar .avatar{width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--accent)); display:grid; place-items:center; font-weight:700; color:#fff; text-decoration:none}
    .topbar .username{color:var(--ink); font-weight:600; text-decoration:none}
    .topbar .logout{padding:8px 16px; border-radius:10px; background:#0f172a; border:1px solid var(--line); color:var(--ink); text-decoration:none; font-weight:600; font-size:.9rem}
    .topbar .logout:hover{background:#1a2740}

    .topbar .guest a{color:var(--primary); text-decoration:none; font-weight:600; margin-right:14px}

    /* shared form/card styles */
    .center-wrap{display:grid; place-items:center; padding:24px}
    .card{width:100%; max-width:460px; background:var(--card); border:1px solid var(--line); border-radius:20px; box-shadow:0 20px 40px rgba(2,6,23,.3); overflow:hidden}
    .head{padding:26px 26px 0 26px}
    .brand2{display:flex; align-items:center; gap:12px}
    .logo2{width:44px; height:44px; border-radius:12px; display:grid; place-items:center; font-weight:800; color:white; background:linear-gradient(135deg,var(--primary),var(--accent))}
    h1{font-size:1.35rem; margin:0}
    .sub{margin:6px 0 0; color:var(--muted)}

    form{padding:22px 26px 26px 26px; display:grid; gap:14px}
    .field{display:grid; gap:8px}
    label{font-size:.95rem; color:#cbd5e1}
    .input{display:flex; align-items:center; gap:10px; background:#0f172a; border:1px solid var(--line); border-radius:14px; padding:14px 16px; transition:border .2s, box-shadow .2s}
    .input:focus-within{border-color:var(--ring); box-shadow:0 0 0 4px rgba(147,197,253,.35)}
    .input input{flex:1; border:0; outline:0; background:transparent; color:var(--ink); font-size:1rem}
    .hint{color:var(--muted); font-size:.85rem}

    .row{display:flex; align-items:center; justify-content:space-between; gap:12px}
    .checkbox{display:flex; align-items:center; gap:8px; color:var(--muted)}
    .checkbox input{accent-color:var(--primary)}
    .row a{color:var(--primary); text-decoration:none}
    .row a:hover{text-decoration:underline}

    .btn{width:100%; border:0; padding:14px 18px; border-radius:12px; background:linear-gradient(135deg, var(--primary), var(--accent)); color:#fff; font-weight:700; cursor:pointer; box-shadow:0 12px 24px rgba(14,165,233,.25); transition:transform .05s ease, filter .15s ease}
    .btn:hover{filter:brightness(1.04)}
    .btn:active{transform:translateY(1px)}

    .or{display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:center; color:var(--muted)}
    .or::before,.or::after{content:""; height:1px; background:linear-gradient(90deg, transparent, var(--line), transparent)}

    .oauth{display:grid; gap:10px}
    .btn-ghost{width:100%; padding:13px 18px; border-radius:12px; background:#0f172a; color:var(--ink); border:1px solid var(--line); cursor:pointer; font-weight:600; display:flex; align-items:center; justify-content:center; gap:12px}
    .btn-ghost:hover{background:#1a2740}

    .foot{padding:0 26px 24px; text-align:center; color:var(--muted)}
    .foot a{color:var(--accent)}

    .error{background:rgba(248,113,113,.1); border:1px solid #f87171; color:#fca5a5; padding:10px 14px; border-radius:10px; font-size:.9rem}

    @media (max-width: 460px){
      .topbar{padding:12px 16px}
      .card{border-radius:16px; margin:12px}
      .head{padding:20px 20px 0}
      form{padding:18px 20px 20px}
      .foot{padding:0 20px 18px}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">L</div>
      <div class="title">سامانه من</div>
    </div>

 
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
