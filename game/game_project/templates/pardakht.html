<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>پرداخت آنلاین | بلو بانک</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-900: #0a1628;
      --blue-800: #0d1f3c;
      --blue-600: #1a3f7a;
      --blue-500: #1e50a2;
      --blue-400: #2d6fd6;
      --blue-300: #4d8fef;
      --accent:   #00c2ff;
      --accent2:  #0af5c8;
      --text-primary: #f0f4ff;
      --text-secondary: #8faad4;
      --text-muted: #4e6b96;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.08);
      --shadow: 0 24px 64px rgba(0,0,0,0.5);
      --radius: 20px;
      --radius-sm: 12px;
    }

    body {
      font-family: 'Vazirmatn', sans-serif;
      background: var(--blue-900);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 900px; height: 600px;
      background: radial-gradient(ellipse, rgba(0,194,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .payment-wrapper {
      width: 100%;
      max-width: 480px;
    }

    /* ─── 3D Card Scene ─── */
    .card-scene {
      perspective: 1000px;
      height: 200px;
      margin-bottom: -28px;
      position: relative;
      z-index: 10;
      cursor: grab;
      user-select: none;
    }
    .card-scene:active { cursor: grabbing; }

    .card-3d {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(.25,.8,.25,1);
      will-change: transform;
    }
    .card-3d.is-flipped { transform: rotateY(180deg); }
    .card-3d.snap-back {
      transition: transform 0.55s cubic-bezier(.34,1.56,.64,1);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    /* FRONT */
    .card-front {
      background: linear-gradient(135deg, var(--blue-600) 0%, var(--blue-400) 60%, #00aaee 100%);
      padding: 24px 28px;
      box-shadow: 0 20px 60px rgba(30,80,162,0.55);
    }
    .card-front::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }
    .card-front::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: rgba(0,194,255,0.12);
    }

    /* BACK */
    .card-back {
      background: linear-gradient(135deg, #0d2244 0%, #1a3f7a 100%);
      transform: rotateY(180deg);
      box-shadow: 0 20px 60px rgba(30,80,162,0.55);
      display: flex;
      flex-direction: column;
    }
    .card-back-strip {
      background: #111;
      height: 44px;
      margin-top: 28px;
      width: 100%;
    }
    .card-back-cvv-row {
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .card-back-cvv-label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }
    .card-back-cvv-box {
      flex: 1;
      background: #fff;
      border-radius: 5px;
      padding: 8px 14px;
      color: #1a2a4a;
      font-size: 15px;
      letter-spacing: 4px;
      font-weight: 700;
      direction: ltr;
      text-align: right;
    }
    .card-back-logo {
      position: absolute;
      bottom: 18px;
      left: 24px;
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
    }
    .card-back-logo span { color: var(--accent); }
    .card-back-brand {
      position: absolute;
      bottom: 14px;
      right: 24px;
      display: flex;
    }
    .card-back-brand .card-circle { width: 26px; height: 26px; border-radius: 50%; opacity: 0.8; }
    .card-back-brand .card-circle:first-child { background: #eb001b; margin-left: -8px; }
    .card-back-brand .card-circle:last-child  { background: #f79e1b; }

    /* Card front elements */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }
    .card-logo { font-size: 18px; font-weight: 700; color: #fff; }
    .card-logo span { color: var(--accent); }
    .chip {
      width: 42px; height: 30px;
      background: linear-gradient(135deg, #d4af37, #f0c040, #c8952a);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .chip-lines {
      width: 28px; height: 18px;
      border: 1.5px solid rgba(0,0,0,0.2);
      border-radius: 3px;
      display: grid;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 2px; padding: 2px;
    }
    .chip-line { background: rgba(0,0,0,0.15); border-radius: 1px; }
    .card-number {
      font-size: 16px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.9);
      font-weight: 500;
      margin-bottom: 18px;
      position: relative; z-index: 1;
      direction: ltr;
    }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: relative; z-index: 1;
    }
    .card-label { font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 2px; }
    .card-value { font-size: 14px; color: #fff; font-weight: 600; }
    .card-brand { display: flex; }
    .card-circle { width: 30px; height: 30px; border-radius: 50%; opacity: 0.85; }
    .card-circle:first-child { background: #eb001b; margin-left: -10px; }
    .card-circle:last-child  { background: #f79e1b; }

    /* Hint */
    .card-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      animation: hint-fade 1.5s ease-in-out 2s forwards;
      opacity: 1;
    }
    @keyframes hint-fade {
      to { opacity: 0; pointer-events: none; }
    }

    /* ─── Panel ─── */
    .payment-panel {
      background: var(--blue-800);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px 32px;
      box-shadow: var(--shadow);
      position: relative;
    }

    .amount-display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 18px 24px;
      text-align: center;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .amount-display::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,194,255,0.05), transparent);
    }
    .amount-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .amount-value {
      font-size: 30px;
      font-weight: 700;
      color: var(--accent);
      direction: ltr;
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 6px;
    }
    .amount-currency {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 7px;
      font-weight: 500;
    }
    .form-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 18px;
      font-size: 15px;
      font-family: 'Vazirmatn', sans-serif;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      direction: ltr;
      text-align: right;
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus {
      border-color: var(--accent);
      background: var(--surface-hover);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .input-icon-wrap { position: relative; }
    .input-icon-wrap .form-input { padding-left: 44px; }
    .input-icon {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 22px 0;
      position: relative;
    }
    .divider::after {
      content: 'یا پرداخت با';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--blue-800);
      padding: 0 12px;
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .quick-pay {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .quick-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-secondary);
      font-size: 13px;
      font-family: 'Vazirmatn', sans-serif;
    }
    .quick-btn:hover {
      background: var(--surface-hover);
      border-color: var(--blue-300);
      color: var(--text-primary);
    }

    .pay-btn {
      width: 100%;
      background: linear-gradient(90deg, var(--blue-500), var(--accent));
      border: none;
      border-radius: var(--radius-sm);
      padding: 17px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Vazirmatn', sans-serif;
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: opacity 0.2s, transform 0.15s;
    }
    .pay-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    .pay-btn:hover::before { transform: translateX(100%); }
    .pay-btn:hover { opacity: 0.95; }
    .pay-btn:active { transform: scale(0.99); }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,194,255,0); }
      50% { box-shadow: 0 0 24px 4px rgba(0,194,255,0.3); }
    }
    .pay-btn { animation: pulse-glow 3s ease-in-out infinite; }

    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      color: var(--text-muted);
      font-size: 12px;
    }
    .security-badge svg { color: var(--accent2); }

    .steps {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .step-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }
    .step.done .step-dot { background: var(--accent2); color: var(--blue-900); }
    .step.active .step-dot { background: var(--accent); color: var(--blue-900); box-shadow: 0 0 12px rgba(0,194,255,0.4); }
    .step.pending .step-dot { background: var(--surface); border: 1.5px solid var(--border); color: var(--text-muted); }
    .step-label { font-size: 10px; white-space: nowrap; }
    .step.done .step-label, .step.active .step-label { color: var(--text-secondary); }
    .step.pending .step-label { color: var(--text-muted); }
    .step-line { width: 40px; height: 1px; background: var(--border); margin-bottom: 20px; }
    .step-line.done { background: var(--accent2); }
  </style>
</head>
<body>
  <div class="payment-wrapper">

    <!-- Drag hint -->
    <div class="card-hint">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16"/><path d="M18 22H8a2 2 0 0 1-2-2V8l4-4h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2z"/>
      </svg>
      روی کارت بکشید تا بچرخد
    </div>

    <!-- 3D Card -->
    <div class="card-scene" id="cardScene">
      <div class="card-3d" id="card3d">

        <!-- FRONT -->
        <div class="card-face card-front">
          <div class="card-header">
            <div class="card-logo">Blue<span>Bank</span></div>
            <div class="chip">
              <div class="chip-lines">
                <div class="chip-line"></div>
                <div class="chip-line"></div>
                <div class="chip-line"></div>
              </div>
            </div>
          </div>
          <div class="card-number">۶۲۱۹  ●●●●  ●●●●  ۴۷۸۲</div>
          <div class="card-footer">
            <div>
              <div class="card-label">دارنده کارت</div>
              <div class="card-value">سپهر باقرنژادیان</div>
            </div>
            <div>
              <div class="card-label">تاریخ انقضا</div>
              <div class="card-value">۰۶/۲۸</div>
            </div>
            <div class="card-brand">
              <div class="card-circle"></div>
              <div class="card-circle"></div>
            </div>
          </div>
        </div>

        <!-- BACK -->
        <div class="card-face card-back">
          <div class="card-back-strip"></div>
          <div class="card-back-cvv-row">
            <div class="card-back-cvv-label">CVV2</div>
            <div class="card-back-cvv-box">●●●</div>
          </div>
          <div class="card-back-logo">Blue<span>Bank</span></div>
          <div class="card-back-brand">
            <div class="card-circle"></div>
            <div class="card-circle"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- Payment Panel -->
    <div class="payment-panel">

      <div class="steps">
        <div class="step done">
          <div class="step-dot">✓</div>
          <div class="step-label">سبد خرید</div>
        </div>
        <div class="step-line done"></div>
        <div class="step active">
          <div class="step-dot">۲</div>
          <div class="step-label">پرداخت</div>
        </div>
        <div class="step-line"></div>
        <div class="step pending">
          <div class="step-dot">۳</div>
          <div class="step-label">تأیید</div>
        </div>
      </div>

      <div class="amount-display">
        <div class="amount-label">مبلغ قابل پرداخت</div>
        <div class="amount-value">
          {{ cart_total|floatformat:0 }}
          <span class="amount-currency">تومان</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">شماره کارت</label>
        <div class="input-icon-wrap">
          <input class="form-input" id="cardNumberInput" type="text" placeholder="XXXX  XXXX  XXXX  XXXX" maxlength="22" />
          <span class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="1" y="4" width="22" height="16" rx="3"/><line x1="1" y1="10" x2="23" y2="10"/>
            </svg>
          </span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">تاریخ انقضا</label>
          <input class="form-input" id="expInput" type="text" placeholder="MM / YY" maxlength="7" />
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">CVV2</label>
          <input class="form-input" id="cvvInput" type="password" placeholder="●●●" maxlength="4" />
        </div>
      </div>

      <br/>

      <div class="form-group">
        <label class="form-label">رمز دوم کارت</label>
        <input class="form-input" type="password" placeholder="رمز دوم یا پویا را وارد کنید" />
      </div>

      <div class="divider"></div>

      <div class="quick-pay">
        <button class="quick-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          بلو اپ
        </button>
        <button class="quick-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
          کیف پول
        </button>
      </div>

      <button class="pay-btn">پرداخت امن ۲٬۴۵۰٬۰۰۰ تومان</button>

      <div class="security-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <polyline points="9 12 11 14 15 10"/>
        </svg>
        پرداخت رمزنگاری‌شده و امن با استاندارد SSL 256bit
      </div>

    </div>
  </div>

  <script>
    // ── 3D Drag + Flip ──
    const scene = document.getElementById('cardScene');
    const card  = document.getElementById('card3d');

    let isDragging = false;
    let startX = 0, startY = 0;
    let currentRotX = 0, currentRotY = 0;
    let baseRotY = 0; // tracks 0 or 180 (flipped state)
    let dragRotX = 0, dragRotY = 0;

    function getClient(e) {
      return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
                       : { x: e.clientX, y: e.clientY };
    }

    function applyTransform(rx, ry) {
      card.style.transition = 'none';
      card.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
    }

    function onStart(e) {
      isDragging = true;
      const p = getClient(e);
      startX = p.x;
      startY = p.y;
      card.style.transition = 'none';
    }

    function onMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const p = getClient(e);
      const dx = p.x - startX;
      const dy = p.y - startY;

      dragRotY = baseRotY + dx * 0.55;
      dragRotX = -dy * 0.35;
      // Clamp vertical
      dragRotX = Math.max(-30, Math.min(30, dragRotX));

      applyTransform(dragRotX, dragRotY);
    }

    function onEnd() {
      if (!isDragging) return;
      isDragging = false;

      // Determine flip state: flip every 90 degrees of Y rotation
      const normalised = ((dragRotY % 360) + 360) % 360;
      // Round to nearest 180
      const target = Math.round(normalised / 180) * 180;
      baseRotY = target;

      card.classList.add('snap-back');
      card.style.transition = '';
      card.style.transform = `rotateX(0deg) rotateY(${target}deg)`;

      setTimeout(() => card.classList.remove('snap-back'), 600);
    }

    // Mouse
    scene.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);

    // Touch
    scene.addEventListener('touchstart', onStart, { passive: true });
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onEnd);

    // ── Live card number on front ──
    const cardNumberInput = document.getElementById('cardNumberInput');
    const cardNumberDisplay = document.querySelector('.card-number');

    cardNumberInput.addEventListener('input', (e) => {
      let v = e.target.value.replace(/\D/g, '').substring(0, 16);
      e.target.value = v.replace(/(.{4})/g, '$1  ').trim();
      const display = v.padEnd(16, '●');
      const parts = [display.slice(0,4), display.slice(4,8), display.slice(8,12), display.slice(12,16)];
      // Mask middle two groups
      cardNumberDisplay.textContent = parts[0] + '  ●●●●  ●●●●  ' + parts[3];
    });

    // ── Expiry format ──
    document.getElementById('expInput').addEventListener('input', (e) => {
      let v = e.target.value.replace(/\D/g, '').substring(0, 4);
      if (v.length >= 2) v = v.slice(0,2) + ' / ' + v.slice(2);
      e.target.value = v;
    });

    // ── CVV flip on focus ──
    const cvvInput = document.getElementById('cvvInput');
    cvvInput.addEventListener('focus', () => {
      baseRotY = 180;
      card.classList.add('snap-back');
      card.style.transition = '';
      card.style.transform = `rotateX(0deg) rotateY(180deg)`;
      setTimeout(() => card.classList.remove('snap-back'), 600);
    });
    cvvInput.addEventListener('blur', () => {
      baseRotY = 0;
      card.classList.add('snap-back');
      card.style.transition = '';
      card.style.transform = `rotateX(0deg) rotateY(0deg)`;
      setTimeout(() => card.classList.remove('snap-back'), 600);
    });

    // ── Pay button ──
    document.querySelector('.pay-btn').addEventListener('click', function() {
      this.textContent = '⏳ در حال پردازش...';
      this.disabled = true;
    });
  </script>
</body>
</html>
