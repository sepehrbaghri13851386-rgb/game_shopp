{% extends 'login_app/base.html' %}
{% block title %}ثبت‌نام{% endblock %}

{% block content %}
<div class="center-wrap">
  <div class="card" role="region" aria-label="فرم ثبت‌نام">
    <header class="head">
      <div class="brand2">
        <div class="logo2">L</div>
        <div>
          <h1>ساخت حساب کاربری</h1>
          <p class="sub">برای شروع، یک حساب جدید بسازید</p>
        </div>
      </div>
    </header>

    <form action="{% url 'register' %}" method="post" novalidate>
      {% csrf_token %}
      {% if error %}<div class="error">{{ error }}</div>{% endif %}

      <div class="field">
        <label for="username">نام کاربری</label>
        <div class="input">
          <input id="username" name="username" type="text" placeholder="نام کاربری" required>
        </div>
      </div>

      <div class="field">
        <label for="email">ایمیل</label>
        <div class="input">
          <input id="email" name="email" type="email" placeholder="example@domain.com" required>
        </div>
      </div>

      <div class="field">
        <label for="password1">رمز عبور</label>
        <div class="input">
          <input id="password1" name="password1" type="password" placeholder="••••••••" minlength="6" required>
        </div>
      </div>

      <div class="field">
        <label for="password2">تکرار رمز عبور</label>
        <div class="input">
          <input id="password2" name="password2" type="password" placeholder="••••••••" minlength="6" required>
        </div>
      </div>

      <button class="btn" type="submit">ثبت‌نام</button>
    </form>

    <div class="foot">حساب دارید؟ <a href="{% url 'login' %}">وارد شوید</a></div>
  </div>
</div>
{% endblock %}
